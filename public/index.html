<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>s0r4n9n's Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header>
    <h1>作ったもの置き場</h1>
    <p><a href="profile.html">プロフィール</a></p>
  </header>

  <div class="tool">
    <h2>今日の日付</h2>
    <p id="today"></p>
  </div>

  <div class="tool">
    <h2>ひとことメッセージ</h2>
    <form id="msg-form">
      <input id="msg-input" maxlength="10" placeholder="10文字まで" required />
      <button>残す</button>
    </form>
    <ul id="msg-list"></ul>
  </div>

  <script>
    const d = new Date();
    document.getElementById("today").textContent =
      `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;

    const msgList = document.getElementById("msg-list");
    const msgForm = document.getElementById("msg-form");
    const msgInput = document.getElementById("msg-input");

    async function loadMessages() {
      const msgs = await (await fetch("/api/messages")).json();
      msgList.replaceChildren(
        ...msgs.map((m) => {
          const li = document.createElement("li");
          li.textContent = m.text; // textContent で入れるので XSS にならない
          return li;
        }),
      );
    }

    msgForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      await fetch("/api/messages", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text: msgInput.value }),
      });
      msgInput.value = "";
      loadMessages();
    });

    loadMessages();
  </script>
</body>

</html>
